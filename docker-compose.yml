services:
  db:
    image: postgres:18
    container_name: clashgpt-dev-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clashroyale_db
    ports:
      - "5433:5432"
    volumes:
      - clashgpt_dev_data:/var/lib/postgresql
      - ./supabase_export.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  clashgpt_dev_data:
